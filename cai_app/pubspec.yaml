name: cai_app
description: Aplicación oficial de Casa de Adoración Internacional (CAI)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Estado
  flutter_bloc: ^8.1.6
  
  # Inyección de dependencias
  get_it: ^7.7.0
  injectable: ^2.4.1
  
  # Navegación
  go_router: ^14.2.0
  
  # Backend y BD
  supabase_flutter: ^2.5.0
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  
  # Audio
  just_audio: ^0.9.39
  audio_service: ^0.18.15
  
  # UI & Gráficos
  webview_flutter: ^4.8.0
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  cached_network_image: ^3.4.0
  table_calendar: ^3.1.2
  
  # Exportación
  pdf: ^3.10.8
  printing: ^5.14.3
  excel: ^4.0.6
  
  # Utilidades
  firebase_messaging: ^15.0.0
  reactive_forms: ^17.0.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  uuid: ^4.4.0
  intl: ^0.20.2
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  injectable_generator: ^2.6.1
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
